input:
  path: 'D:\Video Tacchini'
  recursive: true
  allowed_extensions:
    - ".mp4"
    - ".avi"
    - ".mov"
    - ".mkv"

output:
  directory: "./data/output"

segmentation:
  enabled: true
  segment_duration_seconds: 600

sampling:
  every_n_frames: 50
  every_n_seconds: null

processing:
  diff_threshold: 25
  blur_kernel_size: 5
  active_motion_threshold: 0.02
  
  # Spatial heatmap: divide each frame into a grid and compute motion density per cell
  # Set compute_spatial_grid to true to enable; grids are stored in JSONL records
  compute_spatial_grid: true   # Set to true to enable spatial heatmap feature
  spatial_grid_size: 16        # Grid granularity: 16x16 = 256 cells per frame

logging:
  level: "INFO"
  progress_update_seconds: 30

checkpoint:
  enabled: true
  # Relative paths are resolved under output.directory.
  directory: "checkpoints"
  # Save a running checkpoint every N processed frames (0 disables periodic saves).
  # Segment boundary checkpoints are always saved.
  save_every_frames: 5000
  # Validate core processing/sampling parameters before resuming.
  validate_config_snapshot: true
  # Strict mode fails on checkpoint/output mismatches.
  strict_resume: true

parallelism:
  enabled: true
  # 0 = auto (uses up to logical_cpu-1). For this machine, start with 8 and tune.
  video_workers: 8
  # 0 = auto (max 4). Keep low because plotting is heavy and can contend on resources.
  analytics_workers: 4

# Hierarchy: Define folder structure for metadata extraction (e.g., group/day/video.mp4)
# Enables automatic separation of analysis by group, preventing cross-group comparison
hierarchy:
  enabled: true  # Set to true to enforce hierarchy-based group/day extraction
  # Levels define the expected folder structure, from root to video file
  # Supported types: "string" (arbitrary folder name), "date" (ISO YYYY-MM-DD)
  levels:
    - name: "group"
      type: "string"      # e.g., "GroupA", "GroupB"
    - name: "day"
      type: "date"        # e.g., "2026-04-15"
  date_format: "YYYY-MM-DD"  # Expected date format for "day" level
  fail_on_mixed_groups: false  # Allow multiple groups in the same run; outputs stay separated by group
  fail_on_invalid_date: true  # If true, error if date format doesn't match

# Analytics: Configure trend analysis, metrics, and plotting
analytics:
  enabled: true  # Generate intra-day/inter-day plots and metrics during pipeline runs
  
  # Intra-day window granularity (in seconds)
  # Determines time window for aggregating frame-level data into trends
  intraday_window_seconds: 300  # Default: 5 minutes; set to 0 to skip intra-day analysis
  
  # Smoothing for intra-day time series
  smooth_enabled: true
  smooth_window_size: 3  # Moving average window (odd number recommended)
  
  # Descriptive statistics to compute and save
  descriptive_metrics:
    enabled: true
    # List of percentiles to compute (e.g., [10, 25, 50, 75, 90])
    percentiles: [10, 25, 50, 75, 90]
    # Compute coefficient of variation (std/mean) for variability assessment
    include_coeff_variation: true
    # Compute inter-segment trend (linear regression slope)
    include_trend_slope: true
  
  # Output formats for plots
  output_formats:
    png: true   # Generate static PNG plots
    html: true  # Generate interactive HTML plots (Plotly)
  
  # Plot configuration
  plots:
    # Intra-day time series: motility score over time
    intraday_timeseries: true
    # Intra-day distribution: box/violin plot for time windows
    intraday_distribution: true
    # Heatmap: hour-of-day vs day aggregation
    intraday_heatmap: true
    # Inter-day trend: daily metric evolution
    interday_trend: true
    # Inter-day delta: day-over-day change
    interday_delta: true
  
  # Directory for analytics outputs (relative to output.directory)
  output_subdir: "analytics"
  
  # Metric to use as primary for inter-day trend (e.g., "median", "mean")
  primary_metric: "median"
